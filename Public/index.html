<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Harian</title>
    <link rel="stylesheet" href="/output.css">
</head>
<body class="bg-slate-100 min-h-screen py-10 px-4">
    
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 border border-slate-200">
        <h1 class="text-3xl font-bold text-slate-800 mb-6 text-center">Daftar Tugas</h1>

        <div class="flex mb-6">
            <input type="text" id="taskInput" placeholder="Ketik tugas baru..." 
                   class="grow border border-slate-300 rounded-l-lg px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            <button onclick="addTask()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-r-lg transition duration-200">
                Tambah
            </button>
        </div>

        <ul id="taskList" class="space-y-3">
            </ul>
    </div>

    <script>
        const apiUrl = '/api/tasks';

        
        async function fetchTasks() {
            const response = await fetch(apiUrl);
            const tasks = await response.json();
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = ''; 

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-200 hover:shadow-sm transition';
                
                
                li.innerHTML = `
                    <span class="text-slate-700 break-all mr-2">${task.title}</span>
                    <div class="flex-shrink-0">
                        <button onclick="editTask(${task.id}, '${task.title}')" class="text-amber-500 hover:text-amber-600 mr-3 text-sm font-semibold transition">Edit</button>
                        <button onclick="deleteTask(${task.id})" class="text-red-500 hover:text-red-600 text-sm font-semibold transition">Hapus</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        
        async function addTask() {
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            if (!title) return alert('Tugas tidak boleh kosong!');

            await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title })
            });

            input.value = ''; 
            fetchTasks();     
        }

        
        async function editTask(id, oldTitle) {
            const newTitle = prompt('Ubah tugas:', oldTitle);
            if (newTitle && newTitle.trim() !== '') {
                await fetch(`${apiUrl}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle.trim() })
                });
                fetchTasks(); 
            }
        }

        
        async function deleteTask(id) {
            if (confirm('Yakin ingin menghapus tugas ini?')) {
                await fetch(`${apiUrl}/${id}`, {
                    method: 'DELETE'
                });
                fetchTasks(); 
            }
        }

       
        fetchTasks();
    </script>
</body>
</html>
